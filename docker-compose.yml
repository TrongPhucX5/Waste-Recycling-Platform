version: '3.8'

services:
  # ── MySQL Database ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    container_name: waste_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-WastePlatformDB}
      MYSQL_USER: ${MYSQL_USER:-wasteuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wastepassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u ${MYSQL_USER:-wasteuser} -p${MYSQL_PASSWORD:-wastepassword} --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - waste_network

  # ── .NET 9 Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waste_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=${MYSQL_DATABASE:-WastePlatformDB};User=${MYSQL_USER:-wasteuser};Password=${MYSQL_PASSWORD:-wastepassword};CharSet=utf8mb4;"
      JwtSettings__SecretKey: ${JWT_SECRET:-your-super-secret-key-min-32-chars!!}
      JwtSettings__Issuer: ${JWT_ISSUER:-WastePlatform}
      JwtSettings__Audience: ${JWT_AUDIENCE:-WastePlatformClient}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - waste_network

  # ── Next.js 14 Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    container_name: waste_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - waste_network

# ── Volumes & Networks ──────────────────────────────────────────────
volumes:
  mysql_data:

networks:
  waste_network:
    driver: bridge

